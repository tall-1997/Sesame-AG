name: Cloud Build APK
run-name: Cloud Build - ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'release'
        options:
          - release
          - debug
      create_release:
        description: '同时创建 GitHub Release'
        required: true
        type: boolean
        default: true

env:
  CI: "true"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"

concurrency:
  group: cloud-build-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      attestations: write

    steps:
      - name: Set Timezone to Asia/Shanghai
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ inputs.build_type }} APKs
        run: ./gradlew --no-daemon --stacktrace assemble${{ inputs.build_type == 'release' && 'Release' || 'Debug' }}

      - name: Collect APKs
        id: collect
        run: |
          build_dir="app/build/outputs/apk/${{ inputs.build_type }}"
          suffix="${{ inputs.build_type == 'release' && '' || '-debug' }}"
          staging_dir="/tmp/apks"
          mkdir -p "$staging_dir"

          for arch in universal arm64-v8a armeabi-v7a x86 x86_64; do
            apk=$(find "$build_dir" -name "*-${arch}-*${suffix}.apk" 2>/dev/null | head -n 1)
            if [[ -n "$apk" ]]; then
              cp "$apk" "$staging_dir/"
            fi
          done

          apk_count=$(find "$staging_dir" -name "*.apk" | wc -l)
          echo "apk_count=$apk_count" >> "$GITHUB_OUTPUT"
          echo "staging_dir=$staging_dir" >> "$GITHUB_OUTPUT"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-TK-${{ inputs.build_type }}-apks
          path: ${{ steps.collect.outputs.staging_dir }}/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: inputs.create_release && inputs.build_type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          name: "Sesame-TK ${{ github.ref_name }} (Cloud Build)"
          tag_name: "cloud-build-${{ github.run_number }}"
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            ${{ steps.collect.outputs.staging_dir }}/*.apk
          fail_on_unmatched_files: true
