name: Auto Build Upstream
run-name: Auto Build Upstream - ${{ github.actor || 'schedule' }}

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  UPSTREAM_REPO: Sesame-AG/Sesame-AG
  CI: "true"

concurrency:
  group: auto-upstream-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      latest_tag: ${{ steps.fetch.outputs.latest_tag }}
      latest_commit: ${{ steps.fetch.outputs.latest_commit }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Fetch latest upstream tag
        id: fetch
        run: |
          api_url="https://api.github.com/repos/${UPSTREAM_REPO}/tags?per_page=1&page=1"
          response=$(curl -fsSL "$api_url")
          latest_tag=$(echo "$response" | python3 -c "import json,sys; data=json.load(sys.stdin); print(data[0]['name'] if data else '')")
          latest_commit=$(echo "$response" | python3 -c "import json,sys; data=json.load(sys.stdin); print(data[0]['commit']['sha'] if data else '')")
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "latest_commit=$latest_commit" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $latest_tag ($latest_commit)"

      - name: Check if already built
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.fetch.outputs.latest_tag }}"
          build_tag="${tag}-build"
          if gh release view "$build_tag" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $build_tag already exists, skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $build_tag not found, will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout upstream tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.check.outputs.latest_tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APKs
        run: |
          ./gradlew --no-daemon --stacktrace assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC" \
            --no-parallel

      - name: Collect APKs
        id: collect
        run: |
          release_dir="app/build/outputs/apk/release"
          staging_dir="/tmp/apks"
          mkdir -p "$staging_dir"

          find "$release_dir" -maxdepth 1 -name "*.apk" -exec cp {} "$staging_dir/" \;

          echo "Found APKs:"
          ls -la "$staging_dir"/
          count=$(find "$staging_dir" -maxdepth 1 -name "*.apk" | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "staging_dir=$staging_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-TK-${{ needs.check.outputs.latest_tag }}
          path: ${{ steps.collect.outputs.staging_dir }}
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.check.outputs.latest_tag }}"
          commit="${{ needs.check.outputs.latest_commit }}"
          short_commit="${commit:0:7}"

          gh release create "${tag}-build" \
            ${{ steps.collect.outputs.staging_dir }}/*.apk \
            --title "Sesame-TK ${tag} (自动构建)" \
            --notes "## Sesame-TK ${tag} 自动构建

          基于上游 [${UPSTREAM_REPO}](https://github.com/${UPSTREAM_REPO}) tag \`${tag}\` (commit \`${short_commit}\`) 自动构建。

          **架构说明**：
          - \`app-arm64-v8a-release.apk\` - 64位 ARM 设备
          - \`app-armeabi-v7a-release.apk\` - 32位 ARM 设备
          - \`app-x86_64-release.apk\` - 64位 x86（模拟器）
          - \`app-x86-release.apk\` - 32位 x86（模拟器）
          - \`app-universal-release.apk\` - 通用版

          **注意**：此为自动构建版本，非官方发布。使用前请阅读 [LEGAL.md](https://github.com/${UPSTREAM_REPO}/blob/main/LEGAL.md)。"
